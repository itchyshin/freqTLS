# R-hub v2's generic GitHub Actions workflow. The upstream template is
# https://github.com/r-hub/actions/blob/v1/workflows/rhub.yaml; action references
# are pinned to the current v1 commit for reproducibility.

name: R-hub
run-name: >-
  ${{ github.event.inputs.id || format('Manual run by @{0}', github.triggering_actor) }}:
  ${{ github.event.inputs.name || github.event.inputs.config }}

on:
  workflow_dispatch:
    inputs:
      config:
        description: >-
          Comma-separated list of R-hub platforms to use.
          Full list: https://r-hub.github.io/containers/
        type: string
        default: 'linux,windows,macos'
      name:
        description: 'Run name. You can leave this empty.'
        type: string
      id:
        description: 'Unique ID. You can leave this empty.'
        type: string

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      containers: ${{ steps.rhub-setup.outputs.containers }}
      platforms: ${{ steps.rhub-setup.outputs.platforms }}

    steps:
      - uses: r-hub/actions/setup@31960d331f579d85cb0c868fce1dce2aaf132935 # v1
        with:
          config: ${{ github.event.inputs.config }}
        id: rhub-setup

  linux-containers:
    needs: setup
    if: ${{ needs.setup.outputs.containers != '[]' }}
    runs-on: ubuntu-latest
    name: ${{ matrix.config.label }}
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.setup.outputs.containers) }}
    container:
      image: ${{ matrix.config.container }}

    steps:
      - uses: r-hub/actions/checkout@31960d331f579d85cb0c868fce1dce2aaf132935 # v1
      - uses: r-hub/actions/platform-info@31960d331f579d85cb0c868fce1dce2aaf132935 # v1
        with:
          token: ${{ secrets.RHUB_TOKEN }}
          job-config: ${{ matrix.config.job-config }}
      - uses: r-hub/actions/setup-deps@31960d331f579d85cb0c868fce1dce2aaf132935 # v1
        with:
          token: ${{ secrets.RHUB_TOKEN }}
          job-config: ${{ matrix.config.job-config }}
      - uses: r-hub/actions/run-check@31960d331f579d85cb0c868fce1dce2aaf132935 # v1
        with:
          token: ${{ secrets.RHUB_TOKEN }}
          job-config: ${{ matrix.config.job-config }}

  other-platforms:
    needs: setup
    if: ${{ needs.setup.outputs.platforms != '[]' }}
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.label }}
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.setup.outputs.platforms) }}

    steps:
      - uses: r-hub/actions/checkout@31960d331f579d85cb0c868fce1dce2aaf132935 # v1
      - uses: r-hub/actions/setup-r@31960d331f579d85cb0c868fce1dce2aaf132935 # v1
        with:
          job-config: ${{ matrix.config.job-config }}
          token: ${{ secrets.RHUB_TOKEN }}
      - uses: r-hub/actions/platform-info@31960d331f579d85cb0c868fce1dce2aaf132935 # v1
        with:
          token: ${{ secrets.RHUB_TOKEN }}
          job-config: ${{ matrix.config.job-config }}
      - uses: r-hub/actions/setup-deps@31960d331f579d85cb0c868fce1dce2aaf132935 # v1
        with:
          job-config: ${{ matrix.config.job-config }}
          token: ${{ secrets.RHUB_TOKEN }}
      - uses: r-hub/actions/run-check@31960d331f579d85cb0c868fce1dce2aaf132935 # v1
        with:
          job-config: ${{ matrix.config.job-config }}
          token: ${{ secrets.RHUB_TOKEN }}
