# Builds and deploys the pkgdown site to the gh-pages branch after a successful
# R-CMD-check, or on demand. The benchmark article builds from the cached
# bayesTLS summaries only, so no Stan / cmdstanr is required here.
on:
  workflow_run:
    workflows: ["R-CMD-check"]
    types: [completed]
  workflow_dispatch:

name: pkgdown

permissions:
  contents: write

concurrency:
  group: pkgdown
  cancel-in-progress: true

jobs:
  pkgdown:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # Mirror the R-CMD-check policy: install hard deps + only the soft
          # packages the site build needs (pkgdown + the vignette toolchain), so
          # CI never tries to install bayesTLS (GitHub-only / Stan) or cmdstanr.
          # The comparison vignettes read the cached summaries and their
          # bayesTLS calls are eval = FALSE, so the site never needs them.
          dependencies: '"hard"'
          extra-packages: |
            any::pkgdown
            any::knitr
            any::rmarkdown
            local::.
          needs: website

      # Build via tools/build-site.R so the deployed artifact gets the same
      # internal-page cleanup (AGENTS/CLAUDE/SPEC) as a local build. The script
      # errors if any internal page survives, so the privacy invariant is
      # enforced in CI, not just locally.
      - name: Build site
        run: Rscript tools/build-site.R

      # GitHub Pages serves this repo from the gh-pages branch, so deploy the
      # cleaned site there. .nojekyll keeps pkgdown's underscore-prefixed asset
      # directories from being dropped by Jekyll.
      - name: Disable Jekyll
        run: touch pkgdown-site/.nojekyll

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: pkgdown-site
          branch: gh-pages
          clean: true
