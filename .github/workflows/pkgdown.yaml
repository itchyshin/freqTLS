# Builds and deploys the pkgdown site to the gh-pages branch after a successful
# R-CMD-check on a trusted main-branch push. The benchmark article builds from the cached
# bayesTLS summaries only, and its recipe is display-only code, so no Stan or
# cmdstanr installation is required here.
on:
  workflow_run:
    workflows: ["R-CMD-check"]
    types: [completed]

name: pkgdown

permissions:
  contents: write

concurrency:
  group: pkgdown
  cancel-in-progress: true

jobs:
  pkgdown:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.head_repository.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # A privileged workflow must never execute untrusted PR-head code.
          # workflow_run reaches this job only for a successful main-branch run.
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false

      - uses: r-lib/actions/setup-pandoc@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2

      - uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2
        with:
          # pkgdown is a site-building tool rather than a package Suggest. The
          # comparison vignette reads cached summaries and only displays its
          # bayesTLS recipe, so the site does not need bayesTLS or cmdstanr.
          dependencies: '"hard"'
          extra-packages: |
            any::pkgdown
            any::knitr
            any::rmarkdown
            local::.
          needs: website

      # Build via tools/build-site.R so the deployed artifact gets the same
      # internal-page cleanup (AGENTS/CLAUDE/SPEC) as a local build. The script
      # errors if any internal page survives, so the privacy invariant is
      # enforced in CI, not just locally.
      - name: Build site
        run: Rscript tools/build-site.R

      # GitHub Pages serves this repo from the gh-pages branch, so deploy the
      # cleaned site there. .nojekyll keeps pkgdown's underscore-prefixed asset
      # directories from being dropped by Jekyll.
      - name: Disable Jekyll
        run: touch pkgdown-site/.nojekyll

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4
        with:
          folder: pkgdown-site
          branch: gh-pages
          clean: true
