<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>freqTLS mission control</title>
<style>
:root {
  color-scheme: light dark;
  --bg: #faf9f6;
  --panel: #ffffff;
  --soft: #f1eee8;
  --line: #ded8ce;
  --text: #1f1d1a;
  --muted: #6f6a62;
  --faint: #9a9489;
  --green: #34784a;
  --green-bg: #e8f3eb;
  --gold: #9b6d21;
  --gold-bg: #fbefd8;
  --blue: #2b68a8;
  --blue-bg: #e7f0fb;
  --rose: #a94c63;
  --rose-bg: #f8e7ec;
  --gray-bg: #ebe8e2;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #181716;
    --panel: #23211f;
    --soft: #2d2a26;
    --line: #464039;
    --text: #f0ede8;
    --muted: #b1aaa0;
    --faint: #827b72;
    --green: #8bd19a;
    --green-bg: #1f3425;
    --gold: #e2b465;
    --gold-bg: #3c2f18;
    --blue: #9ec5f2;
    --blue-bg: #1d2d44;
    --rose: #e89aab;
    --rose-bg: #442532;
    --gray-bg: #302d29;
  }
}
* { box-sizing: border-box; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  line-height: 1.45;
}
.wrap { max-width: 1180px; margin: 0 auto; padding: 28px 22px 54px; }
.top {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 18px;
  align-items: start;
}
h1 { margin: 0; font-size: clamp(24px, 3vw, 36px); letter-spacing: 0; }
.sub { max-width: 850px; margin: 8px 0 0; color: var(--muted); font-size: 15px; }
.live {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--muted);
  font-size: 13px;
  white-space: nowrap;
  margin-top: 6px;
}
.dot { width: 9px; height: 9px; border-radius: 50%; background: var(--green); }
.grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
  margin: 24px 0 14px;
}
.card, .panel, .phase, .agent, .matrix-row, .repo {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
}
.card { padding: 15px 16px; min-height: 94px; }
.label { color: var(--muted); font-size: 12px; }
.value { margin-top: 5px; font-size: 30px; font-weight: 700; line-height: 1; }
.note { margin-top: 8px; color: var(--faint); font-size: 12px; }
.progress { height: 10px; display: flex; overflow: hidden; border-radius: 999px; background: var(--gray-bg); margin-top: 8px; }
.bar-verified { background: var(--green); }
.bar-active { background: var(--gold); }
.bar-blocked { background: var(--rose); }
.repo-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
  margin-top: 8px;
}
.repo { padding: 12px 13px; min-height: 104px; }
.repo.dirty { border-color: var(--rose); background: var(--rose-bg); }
.repo-name { display: flex; justify-content: space-between; gap: 8px; align-items: center; font-weight: 700; }
.repo-meta { margin-top: 5px; color: var(--muted); font-size: 12px; overflow-wrap: anywhere; }
.two-col { display: grid; grid-template-columns: 1.06fr .94fr; gap: 16px; margin-top: 18px; }
h2 { font-size: 18px; margin: 26px 0 12px; letter-spacing: 0; }
.phase { margin-bottom: 10px; overflow: hidden; }
.phase-head {
  display: grid;
  grid-template-columns: 84px 1fr auto auto;
  gap: 12px;
  align-items: center;
  padding: 13px 14px;
}
.phase-id { color: var(--muted); font-size: 12px; }
.phase-name { font-weight: 650; }
.phase-owner { color: var(--muted); font-size: 12px; }
.pill {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 76px;
  padding: 3px 10px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 700;
}
.verified { background: var(--green-bg); color: var(--green); }
.active { background: var(--gold-bg); color: var(--gold); }
.queued { background: var(--gray-bg); color: var(--muted); }
.blocked { background: var(--rose-bg); color: var(--rose); }
.planned, .experimental, .partial { background: var(--blue-bg); color: var(--blue); }
.unsupported, .deferred { background: var(--gray-bg); color: var(--muted); }
.slices { padding: 0 14px 12px 110px; }
.slice {
  display: grid;
  grid-template-columns: 11px 1fr auto;
  gap: 10px;
  align-items: start;
  min-height: 32px;
  padding: 7px 0;
  border-top: 1px solid var(--line);
  font-size: 13px;
}
.sdot { width: 8px; height: 8px; border-radius: 50%; margin-top: 6px; background: var(--faint); }
.sdot.verified { background: var(--green); }
.sdot.active { background: var(--gold); }
.sdot.blocked { background: var(--rose); }
.sdot.planned, .sdot.experimental, .sdot.partial { background: var(--blue); }
.panel { padding: 15px 16px; margin-bottom: 14px; }
.panel h3 { margin: 0 0 10px; font-size: 15px; }
.activity, .evidence, .blocker {
  display: grid;
  grid-template-columns: 86px 1fr;
  gap: 10px;
  padding: 8px 0;
  border-top: 1px solid var(--line);
  font-size: 13px;
}
.activity:first-child, .evidence:first-child, .blocker:first-child { border-top: 0; }
.who { font-weight: 700; color: var(--green); }
.stamp { color: var(--faint); font-size: 12px; }
.team {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
}
.agent { padding: 11px 12px; min-height: 74px; }
.agent-top { display: flex; justify-content: space-between; gap: 8px; align-items: center; }
.agent-name { font-weight: 700; }
.agent-role { color: var(--muted); font-size: 12px; margin-top: 4px; }
.matrix {
  display: grid;
  gap: 8px;
}
.matrix-row {
  display: grid;
  grid-template-columns: minmax(160px, .9fr) repeat(6, minmax(82px, .42fr)) minmax(190px, 1.1fr);
  gap: 8px;
  align-items: center;
  padding: 10px;
  font-size: 12px;
}
.matrix-head {
  background: transparent;
  border: 0;
  color: var(--muted);
  font-weight: 700;
  padding-top: 0;
}
.cell { min-width: 0; overflow-wrap: anywhere; }
a { color: var(--blue); text-decoration-thickness: 1px; text-underline-offset: 2px; }
code { background: var(--soft); border-radius: 5px; padding: 1px 5px; font-size: .92em; }
@media (max-width: 900px) {
  .top, .two-col, .grid { grid-template-columns: 1fr; }
  .repo-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .team { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .phase-head { grid-template-columns: 72px 1fr; }
  .phase-owner, .phase-head .pill { justify-self: start; }
  .slices { padding-left: 14px; }
  .matrix-row { grid-template-columns: 1fr; }
  .matrix-head { display: none; }
}
@media (max-width: 560px) {
  .repo-grid { grid-template-columns: 1fr; }
  .team { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<main class="wrap">
  <section class="top">
    <div>
      <h1 id="title">freqTLS mission control</h1>
      <p class="sub" id="subtitle">Loading the freqTLS phase board...</p>
    </div>
    <div class="live"><span class="dot"></span><span id="updated">connecting</span></div>
  </section>

  <section class="grid" id="metrics"></section>
  <section id="progress"></section>

  <h2>Repo Truth</h2>
  <section class="repo-grid" id="repos"></section>

  <section class="two-col">
    <div>
      <h2>Roadmap</h2>
      <div id="phases"></div>
    </div>
    <div>
      <h2>Now</h2>
      <div class="panel">
        <h3>Active work</h3>
        <div id="active-work"></div>
      </div>
      <div class="panel">
        <h3>Activity</h3>
        <div id="activity"></div>
      </div>
      <div class="panel">
        <h3>Blockers and claim guards</h3>
        <div id="blockers"></div>
      </div>
    </div>
  </section>

  <h2>Team</h2>
  <section class="team" id="team"></section>

  <h2>Master capability matrix</h2>
  <section class="matrix" id="matrix"></section>

  <h2>Evidence bank</h2>
  <section class="panel" id="evidence"></section>
</main>

<script>
const BUILD = "r1";
const statusClass = (x) => String(x || "queued").toLowerCase().replace(/[^a-z0-9_-]/g, "-");
const text = (x) => String(x == null ? "" : x);
const esc = (x) => text(x).replace(/[&<>"']/g, (m) => ({
  "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
})[m]);
const pill = (x) => `<span class="pill ${statusClass(x)}">${esc(x)}</span>`;
const link = (x, label) => x ? `<a href="${esc(x)}">${esc(label || x)}</a>` : "";
const itemList = (items, empty) => (items && items.length)
  ? items.map((x) => `<div class="activity"><div class="stamp">${esc(x.when || x.status || "")}</div><div><span class="who">${esc(x.who || x.kind || "")}</span> ${esc(x.text || x.item || "")} ${link(x.url, x.link_label)}</div></div>`).join("")
  : `<div class="activity"><div class="stamp">idle</div><div>${esc(empty)}</div></div>`;

async function readJson(path) {
  const response = await fetch(path + "?_=" + Date.now());
  if (!response.ok) throw new Error(path);
  return response.json();
}

function mergeStatus(base, overlay) {
  return Object.assign({}, base, overlay || {}, {
    metrics: Object.assign({}, base.metrics || {}, (overlay || {}).metrics || {})
  });
}

function renderMetrics(data) {
  const metrics = data.metrics || {};
  const cards = [
    ["Verified", metrics.verified || 0, "Rows with linked evidence"],
    ["Active", metrics.active || 0, "Slices currently moving"],
    ["Blocked", metrics.blocked || 0, "Blocked by claim or access"],
    ["Deferred", metrics.deferred || 0, "Explicitly out of this slice"]
  ];
  document.getElementById("metrics").innerHTML = cards.map(([label, value, note]) =>
    `<article class="card"><div class="label">${esc(label)}</div><div class="value">${esc(value)}</div><div class="note">${esc(note)}</div></article>`
  ).join("");
  const total = Math.max(1, Number(metrics.total || 1));
  const verified = 100 * Number(metrics.verified || 0) / total;
  const active = 100 * Number(metrics.active || 0) / total;
  const blocked = 100 * Number(metrics.blocked || 0) / total;
  document.getElementById("progress").innerHTML =
    `<div class="label">Road to done: ${esc(metrics.verified || 0)} / ${esc(total)} verified rows</div>
     <div class="progress"><div class="bar-verified" style="width:${verified}%"></div><div class="bar-active" style="width:${active}%"></div><div class="bar-blocked" style="width:${blocked}%"></div></div>
     <div class="note">Green is verified, gold is active, rose is blocked.</div>`;
}

function renderPhases(data) {
  document.getElementById("phases").innerHTML = (data.phases || []).map((phase) => {
    const slices = (phase.slices || []).map((s) =>
      `<div class="slice"><span class="sdot ${statusClass(s.status)}"></span><div>${esc(s.name)} ${link(s.url, s.issue)}</div>${pill(s.status)}</div>`
    ).join("");
    return `<article class="phase">
      <div class="phase-head">
        <div class="phase-id">${esc(phase.id)}</div>
        <div><div class="phase-name">${esc(phase.name)}</div><div class="phase-owner">${esc(phase.owner || "")}</div></div>
        <div class="phase-owner">${esc(phase.counts || "")}</div>
        ${pill(phase.status)}
      </div>
      <div class="slices">${slices}</div>
    </article>`;
  }).join("");
}

function renderRepos(data) {
  document.getElementById("repos").innerHTML = (data.repos || []).map((repo) =>
    `<article class="repo ${repo.dirty ? "dirty" : ""}">
      <div class="repo-name"><span>${esc(repo.name)}</span>${pill(repo.dirty ? "dirty" : "clean")}</div>
      <div class="repo-meta">branch: <code>${esc(repo.branch || "detached")}</code></div>
      <div class="repo-meta">head: <code>${esc(repo.head || "unknown")}</code></div>
      <div class="repo-meta">${esc(repo.note || "")}</div>
    </article>`
  ).join("");
}

function renderTeam(data) {
  document.getElementById("team").innerHTML = (data.agents || []).map((agent) =>
    `<article class="agent"><div class="agent-top"><span class="agent-name">${esc(agent.name)}</span>${pill(agent.status)}</div><div class="agent-role">${esc(agent.role)}</div></article>`
  ).join("");
}

function renderMatrix(data) {
  const head = ["Area", "Engine", "Bridge", "Point", "Wald", "Profile", "Bootstrap", "Next gate"];
  const rows = (data.matrix || []).map((row) =>
    `<article class="matrix-row">
      <div class="cell"><strong>${esc(row.area)}</strong></div>
      <div class="cell">${pill(row.engine)}</div>
      <div class="cell">${pill(row.bridge)}</div>
      <div class="cell">${pill(row.point)}</div>
      <div class="cell">${pill(row.wald)}</div>
      <div class="cell">${pill(row.profile)}</div>
      <div class="cell">${pill(row.bootstrap)}</div>
      <div class="cell">${esc(row.next)}</div>
    </article>`
  ).join("");
  document.getElementById("matrix").innerHTML =
    `<article class="matrix-row matrix-head">${head.map((x) => `<div>${esc(x)}</div>`).join("")}</article>${rows}`;
}

function render(data) {
  document.getElementById("title").textContent = data.title || "freqTLS mission control";
  document.getElementById("subtitle").textContent = data.subtitle || "";
  document.getElementById("updated").textContent = "live - " + (data.updated || "unknown");
  renderMetrics(data);
  renderRepos(data);
  renderPhases(data);
  renderTeam(data);
  renderMatrix(data);
  document.getElementById("active-work").innerHTML = itemList(data.active_work, "No active slice recorded.");
  document.getElementById("activity").innerHTML = itemList(data.activity, "No activity recorded.");
  document.getElementById("blockers").innerHTML = itemList(data.blockers, "No blockers recorded.");
  document.getElementById("evidence").innerHTML = itemList(data.evidence, "No evidence rows recorded.");
}

async function tick() {
  try {
    const version = await fetch("version.txt?_=" + Date.now()).then((x) => x.text()).then((x) => x.trim());
    if (version && version !== BUILD) location.reload();
  } catch (err) {}
  try {
    const base = await readJson("status.json");
    let overlay = {};
    try { overlay = await readJson("sweep.json"); } catch (err) {}
    render(mergeStatus(base, overlay));
  } catch (err) {
    document.getElementById("subtitle").textContent = "Dashboard data did not load. Check status.json and sweep.json.";
  }
}

tick();
setInterval(tick, 8000);
</script>
</body>
</html>
