url: https://itchyshin.github.io/freqTLS/

# Build to pkgdown-site/ so the rendered site does not collide with the durable
# docs/ governance tree (design notes, dev-log, agent-kit). The CI pkgdown
# workflow uploads this directory.
destination: pkgdown-site

template:
  bootstrap: 5
  bootswatch: flatly
  includes:
    before_body: |
      <aside id="freqtls-experimental-warning" class="freqtls-experimental-warning" role="alert" aria-labelledby="freqtls-experimental-warning-title">
        <div class="container">
          <strong id="freqtls-experimental-warning-title">Experimental software—use at your own risk.</strong>
          Results and APIs may be incorrect or change. Users are responsible for checking their data, design, model specification, convergence, identifiability, diagnostics, and interpretation. Important analyses should be independently refitted and cross-checked with <a href="https://daniel1noble.github.io/bayesTLS/">bayesTLS</a> (<a href="https://github.com/daniel1noble/bayesTLS">source repository</a>). Agreement is a cross-check, not proof of correctness; shared data or model errors can make both packages agree.
        </div>
      </aside>

# freqTLS has no released/CRAN site yet: publish the current experimental
# development documentation as the single site at the advertised root URL.
development:
  mode: release

home:
  title: freqTLS — frequentist inference for thermal death-time models
  description: >
    Fast, prior-free frequentist confidence intervals — Wald, profile-likelihood,
    and bootstrap — for the 4PL thermal-load-sensitivity (thermal death-time)
    model, fitted by maximum likelihood via TMB. The likelihood complement to
    bayesTLS.
  sidebar:
    structure: [links, license, community, citation, authors, dev]
  links:
    - text: Source code on GitHub
      href: https://github.com/itchyshin/freqTLS
    - text: bayesTLS (the Bayesian sibling)
      href: https://github.com/daniel1noble/bayesTLS

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [search, github]

articles:
  - title: Get started
    navbar: Get started
    contents:
      - freqTLS
  - title: Model details
    navbar: Model details
    contents:
      - model-math
  - title: Canonical empirical examples
    navbar: Examples
    contents:
      - case-study-zebrafish
      - case-study-li-aphids
      - case-study-snowgum
      - case-study-suzukii
      - case-study-suzukii-coma
      - case-study-summary
  - title: Frequentist extensions
    navbar: Extensions
    contents:
      - comparing-to-bayesTLS
      - frequentist-and-bayesian
      - heat-injury
      - profile-likelihood
      - random-effects
  - title: Legacy notices
    contents:
      - case-study-shrimp

reference:
  - title: Fit and extract (shared-name workflow analogues)
    desc: >
      The primary frequentist workflow: standardise the same data, fit the 4PL
      by maximum likelihood, and extract analogous thermal-death-time quantities.
    contents:
      - standardize_data
      - make_4pl_formula
      - fit_4pl
      - tls
      - extract_tdt
      - tdt-accessors
      - predict_survival_curves
      - diagnose_tdt_fit
      - tdt_parameter_table
  - title: Classical two-stage comparator
    desc: The per-temperature GLM + OLS estimator, for benchmarking.
    contents:
      - ts_stage1
      - ts_stage2
      - ts_ci
      - ts_curve
  - title: Engine (lower-level interface)
    desc: >
      The TMB engine behind freqTLS; use it directly for full formula
      control.
    contents:
      - fit_tls
      - tls_bf
      - profile_tls-methods
      - tidy_parameters
      - get_ctmax
      - get_z
      - get_shape
      - ranef
      - check_tls
      - tls_family
  - title: Profile likelihood
    desc: >
      Profile-likelihood deviance curves and prior-free confidence intervals.
    contents:
      - profile.profile_tls
      - confint.profile_tls
  - title: Prediction and plotting
    desc: >
      Predict survival, derive lethal times, and draw the fitted curves, the
      survival surface, and the Confidence Eye.
    contents:
      - predict.profile_tls
      - predict_survival_surface
      - predict_heat_injury
      - heat_injury_envelope
      - plot_heat_injury
      - derive_lt
      - derive_ctmax
      - derive_tcrit
      - plot_survival_curves
      - plot_tdt_curve
      - plot_survival_surface
      - plot_confidence_eye
      - plot.profile_tls_profile
  - title: Simulation
    desc: Generate data from the locked data-generating process.
    contents:
      - simulate_tls
  - title: Utilities
    desc: Small shared helpers (time conversion, interval formatting, quantiles).
    contents:
      - clock_to_minutes
      - format_interval
      - tdt_quantile
  - title: Canonical teaching data
    desc: Published empirical examples mirrored from the pinned bayesTLS supplement; see each help page for source-specific credit and component licences.
    contents:
      - zebrafish_o2
      - dsuzukii
      - aphid_tdt
      - snowgum_psii
  - title: Package
    contents:
      - freqTLS-package
