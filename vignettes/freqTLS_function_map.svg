<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 880" font-family="Helvetica, Arial, sans-serif" width="100%" role="img" aria-labelledby="ftls-map-title ftls-map-desc">
  <title id="ftls-map-title">freqTLS function map</title>
  <desc id="ftls-map-desc">Maximum-likelihood twin of the bayesTLS workflow. Columns: DATA (standardize_data); FIT (fit_4pl, with make_4pl_formula, tidy_parameters and tdt_parameter_table, and diagnose_tdt_fit and check_tls); DERIVE (tls, with tls_z, tls_ctmax and tls_tcrit, plus extract_tdt and the derive_lt, derive_ctmax and derive_tcrit primitives); REPORT and ACCESS (get_ctmax, get_z and get_shape, and the get_*_summary and get_*_draws accessors); PREDICT (predict_survival_curves and predict_heat_injury, with make_temperature_scenarios and repair_rate_schoolfield marked not yet ported); and PLOT (the plot_* family, including plot_confidence_eye). A separate two-stage comparison path runs ts_stage1 to ts_stage2 to ts_ci and ts_curve. A highlighted box lists the freqTLS-only extras: Wald, profile and bootstrap confidence intervals with profile-t calibration, the Confidence Eye, and twelve identifiability warnings.</desc>
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1500" height="880" fill="#ffffff"/>

  <!-- Title -->
  <text x="40" y="46" font-size="26" font-weight="bold" fill="#333">freqTLS function map</text>
  <text x="42" y="72" font-size="13" fill="#777">Maximum-likelihood twin of the bayesTLS workflow. Core user workflow; report/access and prediction are parallel downstream uses.</text>

  <!-- Column header chips -->
  <g font-size="12" font-weight="bold" text-anchor="middle">
    <rect x="150" y="98" width="110" height="26" rx="5" fill="#b6d7a8"/><text x="205" y="115" fill="#274e13">DATA</text>
    <rect x="330" y="98" width="110" height="26" rx="5" fill="#9fc5e8"/><text x="385" y="115" fill="#1c4587">FIT</text>
    <rect x="545" y="98" width="180" height="26" rx="5" fill="#b6d7a8"/><text x="635" y="115" fill="#274e13">DERIVE</text>
    <rect x="800" y="98" width="250" height="26" rx="5" fill="#b4a7d6"/><text x="925" y="115" fill="#20124d">REPORT / ACCESS</text>
    <rect x="1180" y="98" width="240" height="26" rx="5" fill="#d5a6bd"/><text x="1300" y="115" fill="#4c1130">PLOT</text>
    <rect x="800" y="458" width="120" height="26" rx="5" fill="#f9cb9c"/><text x="860" y="475" fill="#783f04">PREDICT</text>
  </g>

  <!-- ============ ARROWS (drawn first, under boxes) ============ -->
  <g fill="none" stroke="#888" stroke-width="1.6" stroke-dasharray="5,4">
    <path d="M128 335 L148 335" marker-end="url(#arr)"/>            <!-- raw -> standardize -->
    <path d="M415 246 L415 286" marker-end="url(#arr)"/>            <!-- model spec -> fit -->
    <path d="M635 172 L635 210" marker-end="url(#arr)"/>            <!-- manual fit -> tls -->
    <path d="M635 408 L635 460" marker-end="url(#arr)"/>            <!-- extract -> advanced -->
    <path d="M917 688 L917 668" marker-end="url(#arr)"/>            <!-- helpers -> heat injury -->
    <path d="M410 809 L468 809" marker-end="url(#arr)"/>            <!-- ts1 -> ts2 -->
    <path d="M630 809 L688 809" marker-end="url(#arr)"/>            <!-- ts2 -> ts_ci -->
  </g>
  <g fill="none" stroke="#555" stroke-width="1.8">
    <path d="M310 336 L328 336" marker-end="url(#arr)"/>            <!-- standardize -> fit -->
    <path d="M415 384 L415 438" marker-end="url(#arr)"/>            <!-- fit -> tidy_parameters -->
    <path d="M500 322 L543 252" marker-end="url(#arr)"/>            <!-- fit -> tls -->
    <path d="M500 352 L543 360" marker-end="url(#arr)"/>            <!-- fit -> extract -->
    <path d="M725 250 L798 251" marker-end="url(#arr)"/>            <!-- tls -> get_ctmax -->
    <path d="M725 360 L798 360" marker-end="url(#arr)"/>            <!-- extract -> accessors -->
    <path d="M1050 251 L1178 384" marker-end="url(#arr)"/>          <!-- get_ctmax -> plot -->
    <path d="M1050 360 L1178 396" marker-end="url(#arr)"/>          <!-- accessors -> plot -->
    <path d="M1035 528 L1178 424" marker-end="url(#arr)"/>          <!-- pred surv -> plot -->
    <path d="M1035 626 L1178 444" marker-end="url(#arr)"/>          <!-- pred heat -> plot -->
    <path d="M500 366 L515 366 L515 528 L798 528" marker-end="url(#arr)"/>  <!-- fit -> pred surv -->
    <path d="M500 376 L515 376 L515 626 L798 626" marker-end="url(#arr)"/>  <!-- fit -> pred heat -->
  </g>

  <!-- ============ BOXES ============ -->
  <!-- raw data -->
  <g text-anchor="middle">
    <rect x="24" y="300" width="104" height="70" rx="7" fill="#ffffff" stroke="#bbbbbb"/>
    <text x="76" y="332" font-size="13" font-weight="bold" fill="#444">raw data</text>
    <text x="76" y="350" font-size="9.5" fill="#777">counts or</text>
    <text x="76" y="362" font-size="9.5" fill="#777">proportions</text>
  </g>
  <!-- standardize_data -->
  <g text-anchor="middle">
    <rect x="150" y="288" width="160" height="96" rx="7" fill="#d9ead3" stroke="#93c47d"/>
    <text x="230" y="334" font-size="15" font-weight="bold" fill="#274e13">standardize_data()</text>
    <text x="230" y="356" font-size="10.5" fill="#666">schema + metadata</text>
  </g>
  <!-- model spec helpers -->
  <g text-anchor="middle">
    <rect x="330" y="182" width="170" height="64" rx="7" fill="#efefef" stroke="#b7b7b7" stroke-dasharray="5,4"/>
    <text x="415" y="203" font-size="11.5" font-weight="bold" fill="#555">model spec helpers</text>
    <text x="415" y="221" font-size="9.5" fill="#777">make_4pl_formula(); tls_bf()</text>
    <text x="415" y="234" font-size="9.5" fill="#777">grammar — no priors (ML)</text>
  </g>
  <!-- fit_4pl -->
  <g text-anchor="middle">
    <rect x="330" y="288" width="170" height="96" rx="7" fill="#cfe2f3" stroke="#6fa8dc"/>
    <text x="415" y="332" font-size="16" font-weight="bold" fill="#1c4587">fit_4pl()</text>
    <text x="415" y="354" font-size="10.5" fill="#666">joint ML 4PL workflow</text>
  </g>
  <!-- tidy_parameters (= get_4pl_est) -->
  <g text-anchor="middle">
    <rect x="330" y="440" width="170" height="74" rx="7" fill="#d9d2e9" stroke="#8e7cc3"/>
    <text x="415" y="468" font-size="13.5" font-weight="bold" fill="#20124d">tidy_parameters()</text>
    <text x="415" y="486" font-size="9.5" fill="#666">+ tdt_parameter_table()</text>
    <text x="415" y="499" font-size="9.5" fill="#666">4PL params, bootstrap draws</text>
  </g>
  <!-- diagnostics -->
  <g text-anchor="middle">
    <rect x="330" y="536" width="170" height="66" rx="7" fill="#efefef" stroke="#b7b7b7" stroke-dasharray="5,4"/>
    <text x="415" y="557" font-size="11.5" font-weight="bold" fill="#555">diagnostics</text>
    <text x="415" y="575" font-size="9.5" fill="#777">diagnose_tdt_fit(); check_tls()</text>
    <text x="415" y="588" font-size="9.5" fill="#777">convergence, pdHess, 12 warnings</text>
  </g>
  <!-- manual TMB fit -->
  <g text-anchor="middle">
    <rect x="545" y="120" width="180" height="52" rx="7" fill="#efefef" stroke="#b7b7b7" stroke-dasharray="5,4"/>
    <text x="635" y="140" font-size="11.5" font-weight="bold" fill="#555">manual TMB fit</text>
    <text x="635" y="157" font-size="9.5" fill="#777">fit_tls() — optional input to tls()</text>
  </g>
  <!-- tls() -->
  <g text-anchor="middle">
    <rect x="545" y="212" width="180" height="86" rx="7" fill="#d9ead3" stroke="#93c47d"/>
    <text x="635" y="248" font-size="16" font-weight="bold" fill="#274e13">tls()</text>
    <text x="635" y="268" font-size="9.5" fill="#666">headline extractor</text>
    <text x="635" y="281" font-size="9.5" fill="#666">+ tls_z / tls_ctmax / tls_tcrit</text>
  </g>
  <!-- extract_tdt() -->
  <g text-anchor="middle">
    <rect x="545" y="322" width="180" height="86" rx="7" fill="#d9ead3" stroke="#93c47d"/>
    <text x="635" y="356" font-size="15" font-weight="bold" fill="#274e13">extract_tdt()</text>
    <text x="635" y="377" font-size="9.5" fill="#666">bundle z, CTmax,</text>
    <text x="635" y="390" font-size="9.5" fill="#666">T_crit, LT curve</text>
  </g>
  <!-- advanced primitives -->
  <g text-anchor="middle">
    <rect x="535" y="462" width="200" height="72" rx="7" fill="#efefef" stroke="#b7b7b7" stroke-dasharray="5,4"/>
    <text x="635" y="484" font-size="11.5" font-weight="bold" fill="#555">advanced primitives</text>
    <text x="635" y="502" font-size="9.5" fill="#777">derive_lt(); derive_ctmax();</text>
    <text x="635" y="515" font-size="9.5" fill="#777">derive_tcrit()</text>
  </g>
  <!-- get_ctmax / get_z / get_shape (= get_tls_est) -->
  <g text-anchor="middle">
    <rect x="800" y="212" width="250" height="82" rx="7" fill="#d9d2e9" stroke="#8e7cc3"/>
    <text x="925" y="245" font-size="14" font-weight="bold" fill="#20124d">get_ctmax() · get_z()</text>
    <text x="925" y="263" font-size="14" font-weight="bold" fill="#20124d">get_shape()</text>
    <text x="925" y="282" font-size="9.5" fill="#666">fit → parameter summaries</text>
  </g>
  <!-- accessors -->
  <g text-anchor="middle">
    <rect x="800" y="322" width="250" height="82" rx="7" fill="#d9d2e9" stroke="#8e7cc3"/>
    <text x="925" y="352" font-size="13.5" font-weight="bold" fill="#20124d">get_*_summary() · get_*_draws()</text>
    <text x="925" y="372" font-size="9.5" fill="#666">per-quantity summaries</text>
    <text x="925" y="385" font-size="9.5" fill="#666">+ bootstrap draws</text>
  </g>
  <!-- predict_survival_curves -->
  <g text-anchor="middle">
    <rect x="800" y="492" width="235" height="74" rx="7" fill="#fce5cd" stroke="#f6b26b"/>
    <text x="917" y="522" font-size="14.5" font-weight="bold" fill="#783f04">predict_survival_curves()</text>
    <text x="917" y="542" font-size="9.5" fill="#666">temp × duration grid</text>
    <text x="917" y="555" font-size="9.5" fill="#666">(+ predict_survival_surface)</text>
  </g>
  <!-- predict_heat_injury -->
  <g text-anchor="middle">
    <rect x="800" y="586" width="235" height="80" rx="7" fill="#fce5cd" stroke="#f6b26b"/>
    <text x="917" y="618" font-size="14.5" font-weight="bold" fill="#783f04">predict_heat_injury()</text>
    <text x="917" y="638" font-size="9.5" fill="#666">dynamic traces</text>
    <text x="917" y="651" font-size="9.5" fill="#666">(+ heat_injury_envelope)</text>
  </g>
  <!-- trace & repair helpers (planned) -->
  <g text-anchor="middle">
    <rect x="800" y="688" width="235" height="56" rx="7" fill="#f4f4f4" stroke="#cc8888" stroke-dasharray="5,4"/>
    <text x="917" y="708" font-size="11" font-weight="bold" fill="#a04545">trace &amp; repair helpers — planned</text>
    <text x="917" y="725" font-size="9.5" fill="#999">make_temperature_scenarios()</text>
    <text x="917" y="737" font-size="9.5" fill="#999">repair_rate_schoolfield()</text>
  </g>
  <!-- plot_*() family -->
  <g text-anchor="middle">
    <rect x="1180" y="330" width="240" height="140" rx="7" fill="#ead1dc" stroke="#c27ba0"/>
    <text x="1300" y="378" font-size="17" font-weight="bold" fill="#4c1130">plot_*() family</text>
    <text x="1300" y="404" font-size="10.5" fill="#666">plot_confidence_eye() (default)</text>
    <text x="1300" y="424" font-size="10.5" fill="#666">survival curves · surface ·</text>
    <text x="1300" y="438" font-size="10.5" fill="#666">TDT curve · heat injury</text>
  </g>
  <!-- freqTLS extras (no bayesTLS twin) -->
  <g text-anchor="middle">
    <rect x="1180" y="150" width="240" height="120" rx="7" fill="#fff2cc" stroke="#e0b94e" stroke-dasharray="5,4"/>
    <text x="1300" y="176" font-size="12.5" font-weight="bold" fill="#7f6000">freqTLS extras</text>
    <text x="1300" y="190" font-size="9.5" fill="#998200">(no bayesTLS twin)</text>
    <text x="1300" y="212" font-size="10" fill="#666">Wald · profile · bootstrap CIs</text>
    <text x="1300" y="226" font-size="10" fill="#666">(profile-t calibrated)</text>
    <text x="1300" y="244" font-size="10" fill="#666">the Confidence Eye;</text>
    <text x="1300" y="258" font-size="10" fill="#666">12 identifiability warnings</text>
  </g>

  <!-- Comparison path -->
  <text x="40" y="800" font-size="11" fill="#777">Comparison path</text>
  <text x="40" y="814" font-size="11" fill="#777">not the core ML workflow</text>
  <g text-anchor="middle">
    <rect x="250" y="782" width="160" height="54" rx="7" fill="#efefef" stroke="#b7b7b7" stroke-dasharray="5,4"/>
    <text x="330" y="806" font-size="12.5" font-weight="bold" fill="#555">ts_stage1()</text>
    <text x="330" y="823" font-size="9.5" fill="#777">classical LT50 by temp</text>
    <rect x="470" y="782" width="160" height="54" rx="7" fill="#efefef" stroke="#b7b7b7" stroke-dasharray="5,4"/>
    <text x="550" y="806" font-size="12.5" font-weight="bold" fill="#555">ts_stage2()</text>
    <text x="550" y="823" font-size="9.5" fill="#777">OLS TDT line</text>
    <rect x="690" y="782" width="175" height="54" rx="7" fill="#efefef" stroke="#b7b7b7" stroke-dasharray="5,4"/>
    <text x="777" y="806" font-size="12.5" font-weight="bold" fill="#555">ts_ci() / ts_curve()</text>
    <text x="777" y="823" font-size="9.5" fill="#777">uncertainty + line</text>
  </g>

  <!-- Legend -->
  <text x="1180" y="858" font-size="10" fill="#888">Solid = main workflow    Dashed = optional / planned</text>
</svg>
